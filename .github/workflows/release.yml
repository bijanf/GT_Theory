name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  bundle-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # required by softprops/action-gh-release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the manifest can record the SHA

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + snakemake
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" "snakemake>=8"

      - name: Render schematic figure
        run: |
          mkdir -p outputs/figures
          PYTHONPATH=src python figures/fig1_interfaces.py \
            --out outputs/figures/fig1_interfaces.pdf

      - name: Run smoke-synthetic to produce summary
        run: |
          PYTHONPATH=src snakemake -s workflows/Snakefile \
            smoke_synthetic --cores 2

      - name: Render extended-data figures
        run: |
          PYTHONPATH=src python figures/ed1_synthetic_twin.py \
            --out outputs/figures/ed1_synthetic_twin.pdf
          PYTHONPATH=src python figures/ed2_carslaw_jaeger.py \
            --out outputs/figures/ed2_carslaw_jaeger.pdf

      - name: Bundle the release artifact
        id: bundle
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          STAGE="gt_theory_${TAG}"
          mkdir -p "${STAGE}"
          cp -r outputs/figures "${STAGE}/figures"
          cp -r outputs/smoke-synthetic "${STAGE}/smoke-synthetic"
          cp README.md LICENSE CITATION.cff .zenodo.json "${STAGE}/"
          cat > "${STAGE}/MANIFEST.json" <<EOF
          {
            "tag": "${TAG}",
            "git_sha": "${GITHUB_SHA}",
            "build_time_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF
          tar czf "${STAGE}.tar.gz" "${STAGE}"
          echo "tarball=${STAGE}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle.outputs.tarball }}
          generate_release_notes: true
          fail_on_unmatched_files: true
