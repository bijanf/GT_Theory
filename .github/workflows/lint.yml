name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-and-mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff>=0.4" "mypy>=1.9" \
                                "numpy>=1.26" "scipy>=1.12" \
                                "pyyaml>=6.0" "matplotlib>=3.8"

      - name: ruff
        run: ruff check src tests

      - name: ruff format check
        run: ruff format --check src tests

      - name: mypy
        run: mypy src/gt_theory
