[project]
name        = "gt-theory"
version     = "0.1.0"
description = "Coupled thermal-hydraulic continental subsurface dynamics"
authors     = ["Bijan Fallah <bijan.fallah01@gmail.com>"]
channels    = ["conda-forge"]
platforms   = ["linux-64", "osx-arm64"]

[dependencies]
python      = ">=3.11,<3.13"
numpy       = ">=1.26"
scipy       = ">=1.12"
pandas      = ">=2.1"
pyarrow     = ">=15.0"
xarray      = ">=2024.1"
netcdf4     = ">=1.6"
pyyaml      = ">=6.0"
matplotlib-base = ">=3.8"
cartopy     = ">=0.22"
tqdm        = ">=4.66"
snakemake-minimal = ">=8"

[feature.dev.dependencies]
pytest       = ">=8"
pytest-mpl   = ">=0.16"
hypothesis   = ">=6.100"
ruff         = ">=0.4"
mypy         = ">=1.9"
pre-commit   = ">=3.7"
ipython      = "*"

[environments]
default = { features = [],      solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }

[tasks]
test       = "pytest -q"
lint       = "ruff check src tests"
fmt        = "ruff format src tests"
typecheck  = "mypy src/gt_theory"
smoke      = "snakemake -s workflows/Snakefile smoke-10 --cores 4"
hpc-full   = "snakemake -s workflows/Snakefile --profile workflows/profiles/pik-hpc full"
paper      = "snakemake -s workflows/Snakefile paper"
