# Borehole catalog for the GT_Theory empirical-validation pipeline.
#
# Source archive: NOAA Paleoclimatology / Huang-Pollack 2000-2013 global
# borehole temperature compilation (952 files).  See
# https://www.ncei.noaa.gov/access/paleo-search/study/1000889.
#
# The full 952-site list is materialised lazily from the raw archive by
# ``gt_theory.catalog.load_full_subset()``.  Curated subsets (``smoke-10``,
# ``smoke-100``, ``permafrost``, ``arid``, ...) are listed explicitly below
# so they are stable across archive updates.
#
# QC tiers
# --------
# 1 (primary):   max_depth >= 300 m, ~ uniform sampling, no flagged anomaly.
# 2 (secondary): max_depth in [200, 300) m or sparse near-surface sampling.
# 3 (excluded):  data quality issues; not used for fingerprints.

schema_version: 1

# Resolve borehole file paths relative to this root.  The path can be
# overridden at runtime by the GT_THEORY_BOREHOLE_ROOT environment variable.
default_data_root: "data/raw/boreholes/huang2000"

subsets:

  # Ten-site stratified smoke subset spanning latitudes -34 to +56 and
  # every continent except Antarctica.  Used by the smoke-10 Snakemake
  # target on the laptop and by the smoke.yml CI workflow.
  smoke-10:
    - AU-10
    - BR-574
    - CA-0001
    - CN-FJ-anxi3101
    - CZ-127127
    - IN-AN8
    - JP-Aso
    - RU-14
    - US-AL7-6
    - ZA-AD3

# Per-site metadata.  Curated entries below are the smoke-10 subset; the
# rest of the 952 sites are loaded directly from the archive headers at
# runtime.  Fields here override the parsed header values, which is the
# escape hatch for hand-corrected lat/lon or QC tier downgrades.

sites:

  AU-10:
    country: Australia
    lat_deg: -34.00
    lon_deg: 151.25
    max_depth_m: 449.58
    measurement_year: 1972.51
    qc_tier: 1
    notes: ""

